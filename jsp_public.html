<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1e">
  <title>JSP Pacy-sur-Eure — Planning</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0f1e;--panel:#111827;--card:#1a2236;--border:#1e3a5f;
      --txt:#e2e8f0;--txt-muted:#64748b;--sdis-bleu:#003087;
      --sdis-or:#e8a020;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;
      --radius:10px;--radius-sm:6px;
    }
    body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

    /* Header */
    header{background:var(--panel);border-bottom:3px solid var(--sdis-bleu);padding:14px 20px;
      display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
    header img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--sdis-or);}
    .header-text h1{font-size:17px;font-weight:700;color:var(--sdis-or);}
    .header-text p{font-size:11px;color:var(--txt-muted);}
    .badge-live{margin-left:auto;background:#16a34a;color:#fff;font-size:10px;font-weight:700;
      padding:3px 8px;border-radius:10px;display:flex;align-items:center;gap:4px;}
    .badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Contenu */
    .container{max-width:640px;margin:0 auto;padding:20px 16px;}

    /* Section titre */
    .section-title{font-size:13px;font-weight:700;color:var(--txt-muted);
      text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;
      display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* Carte séance */
    .seance-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
      padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--sdis-bleu);
      transition:transform .1s;}
    .seance-card:active{transform:scale(.99);}
    .seance-card.today{border-left-color:var(--sdis-or);background:rgba(232,160,32,.05);}
    .seance-card.soon{border-left-color:var(--ok);}
    .seance-date{font-size:13px;font-weight:700;color:var(--sdis-or);margin-bottom:4px;}
    .seance-card.today .seance-date{color:var(--sdis-or);}
    .seance-theme{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:6px;}
    .seance-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--txt-muted);}
    .seance-meta span{display:flex;align-items:center;gap:4px;}
    .badge-today{background:var(--sdis-or);color:var(--sdis-bleu);font-size:10px;
      font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto;}
    .badge-demain{background:var(--ok);color:#fff;font-size:10px;
      font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto;}

    /* Vacances */
    .vacances-card{background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.2);
      border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;
      display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sdis-or);}

    /* Vide */
    .empty{text-align:center;padding:40px 20px;color:var(--txt-muted);}
    .empty-icon{font-size:40px;margin-bottom:10px;}

    /* Loading */
    .loading{text-align:center;padding:40px;color:var(--txt-muted);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--sdis-bleu);
      border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Footer */
    footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--txt-muted);
      border-top:1px solid var(--border);margin-top:20px;}
    footer a{color:var(--sdis-bleu);text-decoration:none;}

    /* Responsive */
    @media(max-width:400px){
      header{padding:10px 14px;}
      header img{width:40px;height:40px;}
      .header-text h1{font-size:15px;}
      .container{padding:14px 12px;}
    }
  </style>
</head>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>

    </div>
  </div>
</div>

<footer>
  Données en temps réel — <a href="https://jsp-pacy.netlify.app" target="_blank">Espace formateurs</a>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSSMGVAQ2ygh2KjPVwePxBnq8_oO6Bzik",
  authDomain: "base-jsp-pacy.firebaseapp.com",
  projectId: "base-jsp-pacy",
  storageBucket: "base-jsp-pacy.firebasestorage.app",
  messagingSenderId: "457252011375",
  appId: "1:457252011375:web:86fe0842684edc24227c9a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Vacances scolaires Normandie Zone B
const VACANCES = [
  {label:'Toussaint 2024', debut:'2024-10-19', fin:'2024-11-04'},
  {label:'Noël 2024',      debut:'2024-12-21', fin:'2025-01-06'},
  {label:'Hiver 2025',     debut:'2025-02-22', fin:'2025-03-10'},
  {label:'Printemps 2025', debut:'2025-04-19', fin:'2025-05-05'},
  {label:'Toussaint 2025', debut:'2025-10-18', fin:'2025-11-03'},
  {label:'Noël 2025',      debut:'2025-12-20', fin:'2026-01-05'},
  {label:'Hiver 2026',     debut:'2026-02-14', fin:'2026-03-02'},
  {label:'Printemps 2026', debut:'2026-04-18', fin:'2026-05-04'},
  {label:'Toussaint 2026', debut:'2026-10-17', fin:'2026-11-02'},
  {label:'Noël 2026',      debut:'2026-12-19', fin:'2027-01-04'},
  {label:'Hiver 2027',     debut:'2027-02-13', fin:'2027-03-01'},
  {label:'Printemps 2027', debut:'2027-04-17', fin:'2027-05-03'},
];

function isVacances(dateStr) {
  return VACANCES.find(v => dateStr >= v.debut && dateStr <= v.fin);
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
}

function cap(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function render(data) {
  const today = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);
  const inTwoWeeks = new Date(Date.now()+14*86400000).toISOString().slice(0,10);

  const seances = (data.seances || [])
    .filter(s => s.date >= today)
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, 12);

  let html = '';

  if (!seances.length) {
    html = '<div class="empty"><div class="empty-icon">📅</div>Aucune séance programmée prochainement.</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Prochain RDV en tête
  const next = seances[0];
  const isToday = next.date === today;
  const isTomorrow = next.date === tomorrow;
  const isSoon = next.date <= inTwoWeeks;

  html += '<div class="section-title">📌 Prochain rendez-vous</div>';
  html += `<div class="seance-card ${isToday?'today':isSoon?'soon':''}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
      <div class="seance-date">${cap(formatDate(next.date))}</div>
      ${isToday ? '<span class="badge-today">Aujourd&#39;hui !</span>' : isTomorrow ? '<span class="badge-demain">Demain</span>' : ''}
    </div>
    <div class="seance-theme">${next.theme || next.type || 'Séance JSP'}</div>
    <div class="seance-meta">
      ${next.lieu ? `<span>📍 ${next.lieu}</span>` : ''}
      ${next.heure ? `<span>🕐 ${next.heure}</span>` : '<span>🕐 13h30</span>'}
      ${next.notes ? `<span>📝 ${next.notes}</span>` : ''}
    </div>
  </div>`;

  // Séances suivantes
  const suivantes = seances.slice(1);
  if (suivantes.length) {
    html += '<div class="section-title">📅 Séances à venir</div>';

    let currentMonth = '';
    suivantes.forEach(s => {
      const month = new Date(s.date).toLocaleDateString('fr-FR', {month:'long', year:'numeric'});
      if (month !== currentMonth) {
        currentMonth = month;
        html += `<div style="font-size:11px;color:var(--txt-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;">${month}</div>`;
      }

      // Vérifier vacances
      const vac = isVacances(s.date);

      html += `<div class="seance-card">
        <div class="seance-date">${cap(new Date(s.date).toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long'}))}</div>
        <div class="seance-theme">${s.theme || s.type || 'Séance JSP'}</div>
        <div class="seance-meta">
          ${s.heure ? `<span>🕐 ${s.heure}</span>` : '<span>🕐 13h30</span>'}
          ${s.notes ? `<span>📝 ${s.notes}</span>` : ''}
        </div>
      </div>`;
    });

    // Prochaines vacances
    const prochainesVac = VACANCES.filter(v => v.debut >= today).slice(0, 2);
    if (prochainesVac.length) {
      html += '<div class="section-title">🏖️ Vacances scolaires</div>';
      prochainesVac.forEach(v => {
        const deb = new Date(v.debut).toLocaleDateString('fr-FR', {day:'2-digit', month:'long'});
        const fin = new Date(v.fin).toLocaleDateString('fr-FR', {day:'2-digit', month:'long'});
        html += `<div class="vacances-card">🏖️ <strong>${v.label}</strong> — du ${deb} au ${fin}</div>`;
      });
    }
  }

  document.getElementById('content').innerHTML = html;
}

// Écoute temps réel
onSnapshot(doc(db, 'sections', 'pacy'), snap => {
  if (snap.exists()) {
    render(snap.data());
  } else {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-icon">🚒</div>Données non disponibles.</div>';
  }
}, err => {
  document.getElementById('content').innerHTML =
    '<div class="empty"><div class="empty-icon">⚠️</div>Impossible de charger le planning.<br><small>' + err.message + '</small></div>';
});
</script>
</body>
</html>
